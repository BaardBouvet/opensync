# Customer sync mappings
#
# Canonical field: customerName
#   A stores "name"     ↔ customerName
#   B already uses "customerName" — no renames needed
#   C stores "fullName" ↔ customerName

mappings:
  - connector: A
    channel: customers
    entity: customers
    fields:
      - source: name
        target: customerName

  - connector: B
    channel: customers
    entity: customers

  - connector: C
    channel: customers
    entity: customers
    fields:
      - source: fullName
        target: customerName
